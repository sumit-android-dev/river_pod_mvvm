name: river_pod_mvvm
description: "River Pod Mvvm"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.0.0
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4
  envied: ^1.3.5
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  envied_generator: any
  build_runner: any
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    #- assets/svg/

  # Import fonts from folder.
  fonts:
    - family: Onest-Light
      fonts:
        - asset: assets/fonts/Onest-Light.ttf

    - family: Onest-Regular
      fonts:
        - asset: assets/fonts/Onest-Regular.ttf

    - family: Onest-Medium
      fonts:
        - asset: assets/fonts/Onest-Medium.ttf

    - family: Onest-SemiBold
      fonts:
        - asset: assets/fonts/Onest-SemiBold.ttf

    - family: Onest-Bold
      fonts:
        - asset: assets/fonts/Onest-Bold.ttf
